<div
    style="background-color: #f7f7f7; color: #1a1a1a; margin: 0; padding: 40px 20px; font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" border="0"
        style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border: 1px solid #eaeaea; border-radius: 4px;">
        <tr>
            <td style="padding: 40px; text-align: center;">

                <!-- LOGO -->
                <div style="margin-bottom: 40px;">
                    <span
                        style="font-family: 'Walkway UltraBold V2', sans-serif; font-size: 24px; font-weight: 500; letter-spacing: 0.1em; color: #111111; text-transform: lowercase;">studio
                        ona</span>
                </div>

                <!-- TITRE -->
                <h2 style="font-size: 20px; font-weight: 600; margin-bottom: 16px; color: #111111; text-align: left;">
                    Réinitialisation de mot de passe
                </h2>

                <!-- TEXTE -->
                <p style="font-size: 15px; line-height: 1.6; color: #444444; margin-bottom: 32px; text-align: left;">
                    Bonjour,<br><br>
                    Nous avons reçu une demande pour réinitialiser le mot de passe de votre compte Studio Ona.
                </p>

                <!-- BOUTON -->
                <div style="margin-bottom: 40px;">
                    <a href="{{ .ConfirmationURL }}"
                        style="display: inline-block; background-color: #111111; color: #ffffff; text-decoration: none; font-size: 14px; font-weight: 600; padding: 14px 32px; border-radius: 4px; letter-spacing: 0.05em; text-transform: uppercase;">
                        Réinitialiser mon mot de passe
                    </a>
                </div>

                <!-- LIEN EN CLAIR -->
                <p style="font-size: 14px; line-height: 1.6; color: #666666; margin-bottom: 32px; text-align: left;">
                    Si le bouton ne fonctionne pas, copiez ce lien :<br>
                    <a href="{{ .ConfirmationURL }}" style="color: #666666; word-break: break-all;">{{ .ConfirmationURL
                        }}</a>
                </p>

                <!-- FOOTER -->
                <div style="border-top: 1px solid #eaeaea; padding-top: 24px;">
                    <p style="font-size: 12px; color: #999999; margin: 0;">
                        © Studio Ona. Tous droits réservés.
                    </p>
                </div>

            </td>
        </tr>
    </table>
</div>
